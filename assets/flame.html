<!doctype html>
<html lang="en">
<!--
  Kill It With Fire — Self-contained Flame Page
  Loaded inside the native macOS overlay (WKWebView with transparent bg).
  Auto-starts the animation. The overlay binary handles auto-close.
-->

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>🔥 Kill It With Fire</title>
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            background: transparent;
            overflow: hidden;
        }

        canvas {
            display: block;
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            touch-action: none;
        }
    </style>
</head>

<body>
    <canvas id="flame"></canvas>
    <script>
        /**
         * Flame Animation Engine (inlined for Raycast asset use).
         * See src/script.js for the fully-documented version.
         */

        // ── Canvas setup ──────────────────────────────────────────────────────
        const canvas = document.getElementById('flame');
        const ctx = canvas.getContext('2d');
        let W = canvas.width = innerWidth;
        let H = canvas.height = innerHeight;
        window.addEventListener('resize', () => {
            W = canvas.width = innerWidth;
            H = canvas.height = innerHeight;
        });

        // ── Particle ──────────────────────────────────────────────────────────
        class Particle {
            constructor(x, y, opts = { type: 'flame' }) {
                this.x = x; this.y = y;
                this.type = opts.type;
                this.seed = Math.random() * 10;
                if (this.type === 'flame') {
                    const spread = 0.6;
                    const ang = (Math.random() - 0.5) * Math.PI * spread - Math.PI / 2;
                    const speed = 200 + Math.random() * 200;
                    this.vx = Math.cos(ang) * speed / 60;
                    this.vy = Math.sin(ang) * speed / 60;
                    this.maxLife = 700 + Math.random() * 900;
                    this.size = 8 + Math.random() * 20;
                    this.gravity = 20;
                } else {
                    this.vx = (Math.random() - 0.5) * 12 / 60;
                    this.vy = -(8 + Math.random() * 30) / 60;
                    this.maxLife = 1000 + Math.random() * 1600;
                    this.size = 14 + Math.random() * 40;
                    this.gravity = -6;
                }
                this.life = this.maxLife;
                this.created = performance.now();
            }
            update(now, dt) {
                const dtSec = dt / 1000;
                const flicker = Math.sin((now - this.created) / 80 + this.seed) * 0.25;
                this.vx += (Math.random() - 0.5) * 0.6 * dtSec;
                this.vx *= Math.pow(0.985, dtSec * 60);
                this.vy += (this.gravity / 60) * dtSec * 60;
                this.x += (this.vx + flicker) * dtSec * 60;
                this.y += this.vy * dtSec * 60;
                this.life -= dt;
                this.size *= 1 - 0.002 * (dt / 16);
            }
            draw(ctx) {
                const t = 1 - Math.max(0, this.life) / this.maxLife;
                if (this.type === 'flame') {
                    const alpha = Math.max(0, (1 - t) * 0.95);
                    const r = 240;
                    const g = Math.floor(120 * (1 - t));
                    const b = Math.floor(30 * (1 - t));
                    const spread = Math.max(1, this.size * (1 - t * 0.6));
                    ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
                    ctx.beginPath();
                    ctx.ellipse(this.x, this.y, spread, spread * 1.4, 0, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    const alpha = Math.max(0, (1 - t) * 0.45);
                    const gray = 40 + Math.floor(80 * t);
                    ctx.fillStyle = `rgba(${gray},${gray},${gray},${alpha})`;
                    ctx.beginPath();
                    ctx.ellipse(this.x, this.y, this.size * (0.6 + t * 0.6), this.size * (0.3 + t * 1.2), 0, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        // ── Shared state ──────────────────────────────────────────────────────
        const particles = [];
        const emitters = [];
        let lastT = 0;

        // ── FullWidthGrowingEmitter ───────────────────────────────────────────
        class FullWidthGrowingEmitter {
            constructor(duration = 3000, basePps = 300) {
                this.basePps = basePps;
                this.duration = duration;
                this.start = performance.now();
                this.accum = 0;
                this.startY = H + 60;
                this.targetTop = H * 0.5;
                this._smokeAcc = 0;
                this.finished = false;
            }
            update(now, dt) {
                const elapsed = now - this.start;
                const progress = Math.min(1, Math.max(0, elapsed / this.duration));
                const maxRise = H - this.targetTop;
                const currentRise = maxRise * progress;
                const minY = H - currentRise - 10;
                const maxY = H + 20;

                const pps = this.basePps * (0.8 + 1.5 * progress);
                this.accum += pps * (dt / 1000);

                while (this.accum >= 1) {
                    this.accum -= 1;
                    const px = Math.random() * W;
                    const py = minY + Math.random() * (maxY - minY);
                    if (Math.random() < 0.18) particles.push(new Particle(px + (Math.random() - 0.5) * 20, py + (Math.random() - 0.5) * 10, { type: 'smoke' }));
                    particles.push(new Particle(px + (Math.random() - 0.5) * 30, py + (Math.random() - 0.5) * 20, { type: 'flame' }));
                }

                const smokePerSec = 40 * (0.5 + progress);
                this._smokeAcc += smokePerSec * (dt / 1000);
                while (this._smokeAcc >= 1) {
                    this._smokeAcc -= 1;
                    const sx = Math.random() * W;
                    const sy = minY - Math.random() * 40;
                    const s = new Particle(sx, sy, { type: 'smoke' });
                    s.maxLife = 2000 + Math.random() * 2200;
                    s.life = s.maxLife;
                    s.vy = -(20 + Math.random() * 60) / 60;
                    particles.push(s);
                }

                if (progress >= 1) this.finished = true;
            }
        }

        // ── Animation loop ────────────────────────────────────────────────────
        function loop(t) {
            if (!lastT) lastT = t || performance.now();
            const now = t || performance.now();
            const dt = Math.min(40, now - lastT);
            lastT = now;

            for (let i = emitters.length - 1; i >= 0; i--) {
                const e = emitters[i];
                e.update(now, dt);
                if (e.finished) emitters.splice(i, 1);
            }
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update(now, dt);
                if (p.life <= 0 || p.size < 0.5) particles.splice(i, 1);
            }

            ctx.clearRect(0, 0, W, H);
            ctx.globalCompositeOperation = 'lighter';
            ctx.save();
            for (const p of particles) p.draw(ctx);
            ctx.restore();

            if (emitters.length > 0 || particles.length > 0) {
                requestAnimationFrame(loop);
            }
        }

        // ── Auto-start ────────────────────────────────────────────────────────
        // Fire starts immediately when the page loads.
        const e = new FullWidthGrowingEmitter(3000, 420);
        emitters.push(e);
        requestAnimationFrame(loop);

        // The native overlay binary handles auto-close — no window.close() needed.
    </script>
</body>

</html>
